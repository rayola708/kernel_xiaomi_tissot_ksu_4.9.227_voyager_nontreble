name: build kernel [Treble]
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5
      
    - name: Prepare timezone 
      run: |
            echo "BUILD_TIME=$(TZ=Asia/Jakarta date "+%d%m%Y-%H%M")" >> $GITHUB_ENV
            sudo rm /etc/localtime
            sudo ln -s /usr/share/zoneinfo/Asia/Jakarta /etc/localtime
        
    - name: Install Dependencies
      run: |
            sudo apt update -y
            sudo apt install bc cpio flex bison aptitude git python-is-python3 tar perl wget curl lz4 -y
            sudo aptitude install libssl-dev -y
        
    - name: Fetch Toolchains 
      run: |
           mkdir -p clang && curl -LS https://github.com/ZyCromerZ/Clang/releases/download/18.0.0git-20240124-release/Clang-18.0.0git-20240124.tar.gz -o clang.tar.gz && tar -C clang/ -xf clang.tar.gz && rm clang.tar.gz
                                    
    - name: Fetch KernelSU-SuSFS
      run: |
            curl -LSs "https://raw.githubusercontent.com/MDonip/KernelSU-Next/legacy-susfs/kernel/setup.sh" | bash -s legacy-susfs    
                                                                          
    - name: Build
      run: |
            export ARCH=arm64
            export PATH="${PWD}/clang/bin:${PWD}/gcc64/bin:${PWD}/gcc32/bin:${PATH}"
            export KBUILD_BUILD_USER=MDonip
            export KBUILD_BUILD_HOST=mhddonip
            export KBUILD_COMPILER_STRING="${PWD}/clang"           
            export LLVM=1 
            export LLVM_IAS=1
            export CLANG_TRIPLE=aarch64-linux-gnu-
            export CROSS_COMPILE=aarch64-linux-android-
            export CROSS_COMPILE_ARM32=arm-linux-androideabi-             
            make O=out tissot_defconfig 
            make -j$(nproc --all) O=out CC=clang LD=ld.lld                  
            mv out/.config out/tissot_defconfig.txt
           
    - name: Upload defconfig 
      uses: actions/upload-artifact@v5
      with:
        name: defconfig-${{ env.BUILD_TIME }}
        path: out/tissot_defconfig.txt

    - name: Fetch AnyKernel3
      run: |

        ANYKERNEL_REPO="https://github.com/MDonip/Anykernel3.git"
        ANYKERNEL_BRANCH="tissot"
        ANYKERNEL="AnyKernel3"
        KERN_IMG="out/arch/arm64/boot/Image.gz-dtb" 
        
        echo "........................"
        echo ".    Packing Kernel    ."
        echo "........................"
        
        if [ -d "${ANYKERNEL}" ]; then
            rm -rf "${ANYKERNEL}"
        fi
        
        git clone "$ANYKERNEL_REPO" -b "$ANYKERNEL_BRANCH" "${ANYKERNEL}"
        
         if [ -f "${KERN_IMG}" ]; then
            cp "${KERN_IMG}" "${ANYKERNEL}"/Image.gz-dtb
            echo "--> Sukses menyalin Image.gz-dtb ke folder AnyKernel3!"
        else
            echo "--> ERROR: Berkas ${KERN_IMG} tidak ditemukan! Proses compile kemungkinan gagal."
            exit 1
        fi
                    
    - name: Upload Kernel
      uses: actions/upload-artifact@v5
      with:
        name: Interstellar-Tissot-Treble-${{ env.BUILD_TIME }}
        path: AnyKernel3/*
