name: Build test

on:
  workflow_dispatch:
  watch:
    types: [started]

defaults:
  run:
    shell: bash

jobs:
  buildtest:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Install Packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            dialog bash sed wget git curl zip tar jq expect make cmake automake autoconf \
            llvm lld lldb clang gcc binutils bison perl gperf gawk flex bc python3 zstd \
            openssl unzip cpio build-essential ccache liblz4-tool libsdl1.2-dev libstdc++6 \
            libxml2 libxml2-utils lzop pngcrush schedtool squashfs-tools xsltproc zlib1g-dev \
            libncurses5-dev bzip2 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            gcc-arm-linux-gnueabi dos2unix kmod binutils-gold

      - name: Setup ZYC Clang
        run: |
          mkdir -p clang-zyc
          cd clang-zyc
            wget -q $(curl -k https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-12-link.txt) -O zyc-clang.tar.gz
            tar -xf zyc-clang.tar.gz
            rm -f zyc-clang.tar.gz
    
      - name: Setup KernelSU (Legacy)
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Patch KernelSU
        run: |
          echo "[+] Patching KernelSU SELinux for Android 10+ / Non Treble..."
          curl -sLo KernelSU-Next/kernel/selinux/rules.c https://raw.githubusercontent.com/rahmatsobrian/kernel_xiaomi_tissot_ksu_4.9.227_voyager_nontreble/main/patch/rules.c
          curl -sLo KernelSU-Next/kernel/selinux/sepolicy.c https://raw.githubusercontent.com/rahmatsobrian/kernel_xiaomi_tissot_ksu_4.9.227_voyager_nontreble/main/patch/sepolicy.c
          curl -sLo KernelSU-Next/kernel/selinux/sepolicy.h https://raw.githubusercontent.com/rahmatsobrian/kernel_xiaomi_tissot_ksu_4.9.227_voyager_nontreble/main/patch/sepolicy.h
          echo "[+] Verifying patches..."
          if grep -q "ksu_set_type_bounds" KernelSU-Next/kernel/selinux/sepolicy.c && \
             grep -q "appdomain" KernelSU-Next/kernel/selinux/rules.c; then
            echo "[SUCCESS] KernelSU SELinux patches applied successfully!"
          else
            echo "[ERROR] SELinux patches failed to apply!"
            exit 1
          fi
          
      - name: Start Build with log
        env:
          KBUILD_BUILD_USER: "RahmatSobrian"
          KBUILD_BUILD_HOST: "ReLIFE"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p logs
          bash buildclang.sh 2>&1 | tee logs/build.txt

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: logs/build.txt

      - name: Upload AnyKernel Zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: anykernel-zip
          path: AnyKernel/*.zip

      - name: Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-gz
          path: out/arch/arm64/boot/Image.gz

      - name: Upload DTB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-gz-dtb
          path: out/arch/arm64/boot/Image.gz-dtb
          
